<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" width="1600" height="1000">
  <!--
    Clean ocean / underwater showcase background, hand-authored (no cards on it).
    Inspired by ai_background.png. The app overlays the real floating card
    images on top of this. Swap this file for a generated PNG later if desired.
  -->
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfeefc"/>
      <stop offset="22%" stop-color="#73d0ee"/>
      <stop offset="55%" stop-color="#2a9fd6"/>
      <stop offset="80%" stop-color="#1668ab"/>
      <stop offset="100%" stop-color="#0b3a6b"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#dffaff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#dffaff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a3360" stop-opacity="0"/>
      <stop offset="100%" stop-color="#06243f" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Water base -->
  <rect width="1600" height="1000" fill="url(#water)"/>

  <!-- Surface glow from above -->
  <rect width="1600" height="1000" fill="url(#sun)"/>

  <!-- God rays -->
  <g opacity="0.55">
    <polygon points="540,-40 700,-40 470,1000 250,1000" fill="url(#ray)"/>
    <polygon points="820,-40 900,-40 760,1000 600,1000" fill="url(#ray)"/>
    <polygon points="1040,-40 1180,-40 1180,1000 980,1000" fill="url(#ray)"/>
    <polygon points="300,-40 360,-40 120,1000 -20,1000" fill="url(#ray)"/>
  </g>

  <!-- Distant gentle waves near surface -->
  <g fill="#ffffff" opacity="0.18">
    <ellipse cx="300" cy="70" rx="320" ry="22"/>
    <ellipse cx="900" cy="40" rx="420" ry="20"/>
    <ellipse cx="1350" cy="90" rx="280" ry="18"/>
  </g>

  <!-- Bubbles -->
  <g fill="#ffffff">
    <circle cx="220" cy="780" r="9" opacity="0.5"/>
    <circle cx="250" cy="700" r="6" opacity="0.4"/>
    <circle cx="270" cy="620" r="4" opacity="0.35"/>
    <circle cx="1240" cy="820" r="11" opacity="0.5"/>
    <circle cx="1270" cy="730" r="7" opacity="0.4"/>
    <circle cx="1300" cy="640" r="5" opacity="0.3"/>
    <circle cx="760" cy="880" r="8" opacity="0.45"/>
    <circle cx="800" cy="800" r="5" opacity="0.35"/>
    <circle cx="120" cy="500" r="5" opacity="0.3"/>
    <circle cx="1480" cy="540" r="6" opacity="0.3"/>
  </g>

  <!-- Seafloor silhouette -->
  <rect y="820" width="1600" height="180" fill="url(#floor)"/>
  <path d="M0,900 Q200,840 380,890 T780,880 T1180,890 T1600,870 L1600,1000 L0,1000 Z"
        fill="#06243f" opacity="0.9"/>

  <!-- Coral / kelp silhouettes -->
  <g fill="#082b4d" opacity="0.85">
    <path d="M140,1000 C120,900 175,880 150,800 C200,860 200,920 210,1000 Z"/>
    <path d="M1460,1000 C1440,890 1500,870 1470,790 C1525,850 1520,930 1535,1000 Z"/>
    <path d="M70,1000 C60,940 90,920 80,870 C110,910 110,955 120,1000 Z"/>
  </g>
</svg>
